# =====================================================================
# Reverse proxy AltPool — Remplace altpool.example.com par ton domaine
# =====================================================================

# Redirection HTTP → HTTPS
server {
  listen 80;
  server_name altpool.example.com;

  # Endpoint webroot pour Let's Encrypt
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# Site HTTPS
server {
  listen 443 ssl;
  http2 on;
  server_name altpool.example.com;

  # Certificats Let's Encrypt
  ssl_certificate     /etc/letsencrypt/live/altpool.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/altpool.example.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;

  # Headers de sécurité
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Taille max upload (avatars 2MB + marge)
  client_max_body_size 10M;

  # ---------- API : /api/* → backend Spring Boot ----------------------
  location /api/ {
    # On enlève /api/ avant de transmettre au backend
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # ---------- Swagger (optionnel — tu peux le désactiver en prod) -----
  location /swagger-ui/ {
    proxy_pass http://backend:8080/swagger-ui/;
    proxy_set_header Host $host;
  }
  location /v3/api-docs {
    proxy_pass http://backend:8080/v3/api-docs;
    proxy_set_header Host $host;
  }

  # ---------- Frontend : tout le reste → React SPA --------------------
  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
